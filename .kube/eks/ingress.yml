apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linqra-ingress
  namespace: linqra
  annotations:
    # Core: Tell AWS to create an ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Network: Discovery & Stickiness
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=3600
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
    
    # Shared Group: This name must be identical across all related ingresses
    alb.ingress.kubernetes.io/group.name: linqra-cluster-group
    
    # SSL: Combined certificates for linqra.com and komunas.com
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:945104357909:certificate/7bf60131-6668-42c1-84d9-775ba7ec780e,arn:aws:acm:us-west-2:945104357909:certificate/9a8bed2e-49c2-4852-b35b-08919ab4a168
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # Health Checks & Protocol
    # Note: We use HTTPS because backends have SSL enabled. Frontends use Service-level overrides to HTTP.
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/backend-protocol: HTTPS
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTPS
    
spec:
  rules:
    # --- LINQRA MAIN ---
    - host: linqra.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /linq
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /ws-linqra
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linqra-frontend-service
                port:
                  number: 80

    - host: www.linqra.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /linq
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /ws-linqra
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linqra-frontend-service
                port:
                  number: 80

    # --- POLYTECHNIC (ADVISING) ---
    - host: advising.linqra.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /linq
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /r/polytechnic-app
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /ws-linqra
