                port:
                  number: 80

    # --- KOMUNAS ---
    - host: komunas.com
      http:
        paths:
          - path: /r/komunas-app
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /
            pathType: Prefix
            backend:
              service:
                name: komunas-frontend-service
                port:
                  number: 80

    - host: www.komunas.com
      http:
        paths:
          - path: /r/komunas-app
            pathType: Prefix
