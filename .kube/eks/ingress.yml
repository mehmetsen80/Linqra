apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linqra-ingress
  namespace: linqra
  annotations:
    # Core: Tell AWS to create an ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Network: Discovery
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=3600
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
    
    # SSL: Use your ACM Certificate
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:945104357909:certificate/7bf60131-6668-42c1-84d9-775ba7ec780e
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # Health Checks
    alb.ingress.kubernetes.io/healthcheck-path: /health # React health check
    
spec:
  rules:
    - host: linqra.com # Optional: Remove if testing without DNS
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /linq
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          # WebSocket endpoints
          - path: /ws-linqra
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linqra-frontend-service
                port:
                  number: 80
    - host: www.linqra.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /linq
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          # WebSocket endpoints
          - path: /ws-linqra
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linqra-frontend-service
                port:
                  number: 80
    - host: advising.linqra.com
      http:
        paths:
          - path: /r/polytechnic-app
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /ws-linqra
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 7777
          - path: /
            pathType: Prefix
            backend:
              service:
                name: polytechnic-frontend-service
                port:
                  number: 80
