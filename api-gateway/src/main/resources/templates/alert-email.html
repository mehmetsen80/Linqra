<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #0d1117;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #c9d1d9;
    }
    .container {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background: rgba(22, 27, 34, 0.8);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .header {
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 25px;
        text-align: center;
    }
    .logo {
        font-size: 28px;
        font-weight: 800;
        color: #ed7534 !important;
        letter-spacing: -1px;
        text-decoration: none;
    }
    .title {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 15px;
    }
    .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(237, 117, 52, 0.2);
        color: #ff8c4c;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .summary {
        font-size: 16px;
        line-height: 1.6;
        color: #8b949e !important;
        margin-bottom: 25px;
    }
    .details-box {
        background-color: #161b22; /* Solid fallback */
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 20px;
        border-left: 4px solid #ed7534;
        margin-bottom: 25px;
    }
    .details-title {
        font-size: 14px;
        font-weight: 600;
        color: #ffffff !important;
        margin-bottom: 10px;
        text-transform: uppercase;
    }
    .details-content {
        font-size: 15px;
        line-height: 1.5;
        white-space: pre-wrap;
        color: #c9d1d9 !important;
    }
    .footer {
        text-align: center;
        font-size: 13px;
        color: #484f58;
        margin-top: 40px;
    }
    .cta-button {
        display: block;
        width: 100%;
        padding: 14px;
        text-align: center;
        background-color: #ed7534; /* Solid fallback */
        background: linear-gradient(135deg, #ed7534 0%, #d65f1f 100%);
        color: #ffffff !important;
        text-decoration: none !important;
        border-radius: 8px;
        font-weight: 700;
        margin-top: 30px;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">Linqra</span>
        </div>
        <div class="badge">AGENT ALERT</div>
        <div class="title">[TITLE]</div>
        <div class="summary">[SUMMARY]</div>
        <div class="details-box">
            <div class="details-title">Analysis Details</div>
            <div class="details-content">[DETAILS]</div>
        </div>
        [CHANGES]
        <a href="[REPORT_URL]" class="cta-button">View Full Report</a>
        <div class="footer">
            &copy; 2026 Linqra Inc. &bull; Sovereign Agent Platform
        </div>
    </div>
</body>
</html>
