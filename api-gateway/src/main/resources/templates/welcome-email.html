<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #0d1117;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #c9d1d9;
    }
    .container {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background: rgba(22, 27, 34, 0.8);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .header {
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 25px;
        text-align: center;
    }
    .logo {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #ed7534 0%, #ff8c4c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
    }
    .title {
        font-size: 24px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 20px;
        text-align: center;
    }
    .content {
        font-size: 16px;
        line-height: 1.6;
        color: #8b949e;
        margin-bottom: 25px;
    }
    .footer {
        text-align: center;
        font-size: 13px;
        color: #484f58;
        margin-top: 40px;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">Linqra</span>
        </div>
        <div class="title">Welcome to Linqra!</div>
        <div class="content">
            <p>Hello <b>[USERNAME]</b>,</p>
            <p>Thank you for registering. We are excited to have you on board!</p>
            <br/>
            <p>Best regards,</p>
            <p>The Linqra Team</p>
        </div>
        <div class="footer">
            &copy; 2026 Linqra Inc. &bull; Sovereign Agent Platform
        </div>
    </div>
</body>
</html>
